<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夫妻360夜间话题</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c2185b;
    --red-dark: #fce4ec;
    --red-light: #f48fb1;
    --cream: #FFF8F0;
    --gold: #D4A017;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #fce4ec 0%, #fdf0f5 50%, #f8e1f4 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,182,193,0.25) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(244,143,177,0.2) 0%, transparent 50%);
    pointer-events: none;
  }
  .decoration { position: fixed; pointer-events: none; opacity: 0.12; font-size: 120px; color: #e91e8c; user-select: none; }
  .decoration.tl { top: -20px; left: -20px; transform: rotate(-15deg); }
  .decoration.br { bottom: -20px; right: -20px; transform: rotate(15deg); }
  .decoration.tr { top: 10px; right: -10px; transform: rotate(10deg); font-size: 80px; }
  .decoration.bl { bottom: 10px; left: -10px; transform: rotate(-10deg); font-size: 80px; }

.header { text-align: center; margin-bottom: 20px; z-index: 10; animation: fadeDown 0.6s ease; }
.brand { font-family: ‘Ma Shan Zheng’, cursive; font-size: 13px; color: #c2185b; letter-spacing: 4px; margin-bottom: 6px; text-shadow: 0 1px 3px rgba(194,24,91,0.15); }
.title { font-family: ‘ZCOOL XiaoWei’, serif; font-size: 28px; color: #880e4f; letter-spacing: 2px; text-shadow: 0 1px 0 #f8bbd0, 0 2px 6px rgba(136,14,79,0.2); }
.subtitle { font-size: 11px; color: #ad1457; letter-spacing: 3px; margin-top: 4px; }

.card-container { position: relative; width: 340px; height: 210px; z-index: 10; margin-bottom: 22px; }
.card-shadow { position: absolute; width: 320px; height: 190px; border-radius: 16px; left: 50%; transform-origin: center bottom; }
.card-shadow:nth-child(1) { background: rgba(255,255,255,0.06); transform: translateX(-50%) translateY(10px) rotate(3deg); }
.card-shadow:nth-child(2) { background: rgba(255,255,255,0.10); transform: translateX(-50%) translateY(6px) rotate(-2deg); }

.card {
position: absolute; left: 50%; top: 0; transform: translateX(-50%);
width: 320px; height: 190px; background: var(–cream);
border-radius: 16px; padding: 16px 22px 12px;
cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
display: flex; flex-direction: column; justify-content: space-between;
overflow: hidden; z-index: 5;
}
.card::before {
content: ‘’; position: absolute; top: 0; right: 0;
width: 80px; height: 80px;
background: radial-gradient(circle at top right, rgba(200,16,46,0.08), transparent 70%);
border-radius: 0 16px 0 100%;
}
.card:active { transform: translateX(-50%) scale(0.97); }
.card.type-riddle { background: linear-gradient(135deg, #fff8f0 60%, #fff3e0); }
.card.type-game { background: linear-gradient(135deg, #f0f8ff 60%, #e0efff); }
.card.type-dare { background: linear-gradient(135deg, #fff0f4 60%, #ffe0e8); }
.card.type-deep { background: linear-gradient(135deg, #f5f0ff 60%, #ede0ff); }
.card.type-flirt { background: linear-gradient(135deg, #fff0f8 60%, #ffd6ee); }
.card.type-ex { background: linear-gradient(135deg, #f5f5f5 60%, #e8e8e8); }

.card-type-badge {
display: inline-flex; align-items: center; gap: 4px;
font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
padding: 2px 10px; border-radius: 20px; margin-bottom: 3px; align-self: flex-start;
}
.badge-talk { background: rgba(200,16,46,0.12); color: var(–red); }
.badge-riddle { background: rgba(180,100,0,0.12); color: #8a5000; }
.badge-game { background: rgba(0,80,180,0.12); color: #0044aa; }
.badge-dare { background: rgba(200,0,80,0.12); color: #aa0040; }
.badge-deep { background: rgba(80,0,160,0.12); color: #5000aa; }
.badge-flirt { background: rgba(180,0,120,0.12); color: #990066; }
.badge-ex { background: rgba(60,60,60,0.12); color: #444444; }

.card-question {
font-family: ‘ZCOOL XiaoWei’, serif;
font-size: 18px; color: #2a1010; line-height: 1.6;
flex: 1; display: flex; align-items: center; padding: 3px 0;
}
.card-question.small { font-size: 15px; }
.card-question.xsmall { font-size: 13px; }

.answer-text {
display: none; font-size: 11px; color: #8a5000;
font-style: italic; margin: 2px 0 4px; line-height: 1.4;
}
.answer-text.show { display: block; }

.card-meta { display: flex; justify-content: space-between; align-items: center; }
.card-number { font-size: 10px; color: #999; letter-spacing: 1px; }
.card-tag { font-size: 9px; background: rgba(200,16,46,0.1); color: var(–red); padding: 2px 8px; border-radius: 20px; letter-spacing: 1px; }
.reveal-btn {
font-size: 10px; color: #8a5000; background: rgba(180,100,0,0.1);
border: none; border-radius: 12px; padding: 3px 10px; cursor: pointer;
letter-spacing: 1px; font-family: ‘Noto Serif SC’, serif; transition: all 0.2s;
}
.reveal-btn:hover { background: rgba(180,100,0,0.2); }

@keyframes cardFlip {
0% { transform: translateX(-50%) rotateY(0deg) scale(1); }
40% { transform: translateX(-50%) rotateY(90deg) scale(0.9); }
60% { transform: translateX(-50%) rotateY(90deg) scale(0.9); }
100% { transform: translateX(-50%) rotateY(0deg) scale(1); }
}
.card.flipping { animation: cardFlip 0.5s ease; }

.controls { display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 10; }
.btn-draw {
background: #c2185b; color: white; border: none;
padding: 13px 44px; border-radius: 50px;
font-family: ‘ZCOOL XiaoWei’, serif; font-size: 18px; letter-spacing: 3px;
cursor: pointer; transition: all 0.2s ease;
box-shadow: 0 4px 20px rgba(194,24,91,0.35);
}
.btn-draw:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(194,24,91,0.45); }
.btn-draw:active { transform: translateY(0) scale(0.97); }

.filter-row { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; max-width: 340px; }
.filter-btn {
background: rgba(194,24,91,0.08); color: #880e4f;
border: 1px solid rgba(194,24,91,0.25); padding: 6px 14px;
border-radius: 22px; font-size: 14px; letter-spacing: 0.5px;
cursor: pointer; transition: all 0.2s; font-family: ‘Noto Serif SC’, serif;
}
.filter-btn.active { background: #c2185b; color: white; border-color: #c2185b; }

.progress-ring { position: fixed; top: 12px; left: 20px; z-index: 20; }
.progress-ring svg { width: 44px; height: 44px; transform: rotate(-90deg); }
.progress-ring circle { fill: none; stroke-width: 3; }
.ring-bg { stroke: rgba(194,24,91,0.15); }
.ring-fill { stroke: #c2185b; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #ad1457; }

.counter { position: fixed; top: 20px; right: 20px; text-align: right; z-index: 20; }
.counter-num { font-family: ‘ZCOOL XiaoWei’, serif; font-size: 32px; color: #c2185b; line-height: 1; text-shadow: 0 1px 3px rgba(194,24,91,0.2); }
.counter-label { font-size: 9px; color: #ad1457; letter-spacing: 2px; }

.score-panel { position: fixed; top: 62px; left: 10px; z-index: 20; display: flex; flex-direction: column; gap: 4px; }

.score-item {
display: flex; align-items: center; gap: 6px;
background: none; border-radius: 12px;
padding: 4px 8px 4px 4px; cursor: pointer;
border: none; transition: all 0.2s;
position: relative;
}
.score-item:hover { transform: scale(1.06); }
.score-item.winner::after {
content: ‘🏆’; position: absolute; top: -8px; right: -6px; font-size: 14px;
}

.avatar-svg { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35)); }

.score-info { display: flex; flex-direction: column; }
.score-label { font-size: 9px; color: #c2185b; letter-spacing: 1px; }
.score-num {
font-family: ‘ZCOOL XiaoWei’, serif; font-size: 22px; color: #880e4f; line-height: 1.1;
text-shadow: 0 1px 0 #f8bbd0, 0 2px 4px rgba(136,14,79,0.2);
}

/* Guess prompt banner shown on riddle/game cards */
.guess-prompt {
position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85);
font-size: 10px; letter-spacing: 1.5px; padding: 4px 14px;
border-radius: 20px; white-space: nowrap; pointer-events: none;
opacity: 0; transition: opacity 0.3s;
font-family: ‘Noto Serif SC’, serif;
}
.guess-prompt.show { opacity: 1; }

.btn-fav { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.35; transition: all 0.2s; z-index: 10; }
.btn-fav:hover, .btn-fav.active { opacity: 1; }
.btn-fav.active { color: var(–red); }

.history-toggle {
position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
background: rgba(194,24,91,0.08); border: 1px solid rgba(194,24,91,0.25);
color: #ad1457; padding: 6px 18px; border-radius: 20px;
font-size: 11px; cursor: pointer; letter-spacing: 1px; z-index: 20;
font-family: ‘Noto Serif SC’, serif;
}

.toast {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%) scale(0.8);
background: rgba(0,0,0,0.75); color: white;
padding: 10px 24px; border-radius: 24px; font-size: 13px;
opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 100;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

@keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
.particle { position: fixed; pointer-events: none; font-size: 20px; animation: floatUp 1.5s ease forwards; z-index: 50; }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(0.5) rotate(20deg); } }
</style>

</head>
<body>

<div class="decoration tl">❤</div>
<div class="decoration br">❤</div>
<div class="decoration tr">✦</div>
<div class="decoration bl">✦</div>

<div class="progress-ring">
  <svg viewBox="0 0 44 44">
    <circle class="ring-bg" cx="22" cy="22" r="19"/>
    <circle class="ring-fill" id="ringFill" cx="22" cy="22" r="19" stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
  </svg>
  <div class="ring-text" id="ringText">0%</div>
</div>

<div class="score-panel">
  <!-- Female avatar -->
  <div class="score-item" id="scoreItemA" onclick="addWin('A')" title="女生猜对了！">
    <svg class="avatar-svg" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="18" fill="#f7e0d0"/>
      <!-- body / shoulders -->
      <path d="M4 36 Q6 27 18 26 Q30 27 32 36 Z" fill="#e885aa"/>
      <!-- neck -->
      <rect x="15.5" y="23" width="5" height="4" rx="2" fill="#f0c8a0"/>
      <!-- hair back layer (bob shape) -->
      <path d="M8 14 Q8 28 18 29 Q28 28 28 14 Q28 6 18 5 Q8 6 8 14 Z" fill="#1a1a1a"/>
      <!-- face -->
      <ellipse cx="18" cy="18" rx="8.5" ry="9.5" fill="#f5c8a0"/>
      <!-- bangs — straight across -->
      <path d="M10 13 Q12 8 18 7.5 Q24 8 26 13 Q22 11 18 11 Q14 11 10 13 Z" fill="#1a1a1a"/>
      <!-- bob sides come down to jaw -->
      <path d="M9.5 16 Q8.5 22 10 26 Q13 29 18 29 Q23 29 26 26 Q27.5 22 26.5 16" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- ears -->
      <ellipse cx="9.5" cy="18.5" rx="1.6" ry="2" fill="#f0b88a"/>
      <ellipse cx="26.5" cy="18.5" rx="1.6" ry="2" fill="#f0b88a"/>
      <!-- eyebrows — gentle arch -->
      <path d="M13.2 14.2 Q14.8 13.3 16.2 14" stroke="#2a1a1a" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <path d="M19.8 14 Q21.2 13.3 22.8 14.2" stroke="#2a1a1a" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <!-- eyes — almond shape -->
      <path d="M12.8 16.5 Q14.5 15.2 16.2 16.5 Q14.5 17.8 12.8 16.5 Z" fill="#1a1a1a"/>
      <path d="M19.8 16.5 Q21.5 15.2 23.2 16.5 Q21.5 17.8 19.8 16.5 Z" fill="#1a1a1a"/>
      <circle cx="14.2" cy="16" r="0.55" fill="white"/>
      <circle cx="20.8" cy="16" r="0.55" fill="white"/>
      <!-- double eyelid line -->
      <path d="M12.8 16.5 Q14.5 15.5 16.2 16.5" stroke="#3a2a1a" stroke-width="0.5" fill="none"/>
      <path d="M19.8 16.5 Q21.5 15.5 23.2 16.5" stroke="#3a2a1a" stroke-width="0.5" fill="none"/>
      <!-- nose — delicate -->
      <path d="M17.2 19.8 Q18 20.8 18.8 19.8" stroke="#c89070" stroke-width="0.7" fill="none" stroke-linecap="round"/>
      <!-- lips — small bow -->
      <path d="M15.5 22 Q16.5 21.4 18 21.6 Q19.5 21.4 20.5 22" stroke="#d4706a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M15.5 22 Q18 23.8 20.5 22" stroke="#d4706a" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- blush dots -->
      <circle cx="12.5" cy="20" r="1.8" fill="#f4a0b0" opacity="0.35"/>
      <circle cx="23.5" cy="20" r="1.8" fill="#f4a0b0" opacity="0.35"/>
      <!-- small earring -->
      <circle cx="9.5" cy="20.5" r="1" fill="#FFD700"/>
    </svg>
    <div class="score-info">
      <span class="score-label">女生赢</span>
      <span class="score-num" id="scoreA">0</span>
    </div>
  </div>

  <!-- Male avatar -->

  <div class="score-item" id="scoreItemB" onclick="addWin('B')" title="男生猜对了！">
    <svg class="avatar-svg" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="18" fill="#FDDBB4"/>
      <!-- short hair -->
      <ellipse cx="18" cy="11" rx="10" ry="8" fill="#1a1a1a"/>
      <!-- hair side coverage -->
      <rect x="8" y="11" width="3" height="7" rx="1.5" fill="#1a1a1a"/>
      <rect x="25" y="11" width="3" height="7" rx="1.5" fill="#1a1a1a"/>
      <!-- face -->
      <ellipse cx="18" cy="18" rx="9" ry="10" fill="#FDDBB4"/>
      <!-- hair top flat -->
      <ellipse cx="18" cy="9" rx="9" ry="5" fill="#1a1a1a"/>
      <!-- ears -->
      <ellipse cx="9" cy="18" rx="1.8" ry="2.2" fill="#f0c89a"/>
      <ellipse cx="27" cy="18" rx="1.8" ry="2.2" fill="#f0c89a"/>
      <!-- eyes -->
      <ellipse cx="14.5" cy="17" rx="1.6" ry="1.6" fill="#1a1a1a"/>
      <ellipse cx="21.5" cy="17" rx="1.6" ry="1.6" fill="#1a1a1a"/>
      <circle cx="15" cy="16.5" r="0.5" fill="white"/>
      <circle cx="22" cy="16.5" r="0.5" fill="white"/>
      <!-- eyebrows thicker -->
      <path d="M13 14.5 Q14.5 13.8 16 14.5" stroke="#1a1a1a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <path d="M20 14.5 Q21.5 13.8 23 14.5" stroke="#1a1a1a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <!-- nose broader -->
      <path d="M17 19.5 Q18 21 19 19.5" stroke="#c8956a" stroke-width="0.9" fill="none"/>
      <!-- lips thinner -->
      <path d="M15.5 22.5 Q18 23.5 20.5 22.5" stroke="#b87060" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- slight stubble hint -->
      <ellipse cx="18" cy="24" rx="4" ry="1" fill="#e8b88a" opacity="0.3"/>
      <!-- shoulder/body -->
      <path d="M5 36 Q7 27 18 26 Q29 27 31 36 Z" fill="#6080c0"/>
    </svg>
    <div class="score-info">
      <span class="score-label">男生赢</span>
      <span class="score-num" id="scoreB">0</span>
    </div>
  </div>
</div>

<div class="counter">
  <div class="counter-num" id="counterNum">0</div>
  <div class="counter-label">已抽取</div>
</div>

<div class="header">
  <div class="brand">❤ 拔草莓 ❤</div>
  <div class="title">夫妻夜间话题</div>
  <div class="subtitle">360个专属对话 · 话题 · 游戏 · 谜语 · 挑战</div>
</div>

<div class="card-container">
  <div class="card-shadow"></div>
  <div class="card-shadow"></div>
  <div class="guess-prompt" id="guessPrompt">👆 点头像记录谁猜对了！</div>
  <div class="card" id="mainCard">
    <button class="btn-fav" id="favBtn">♡</button>
    <div class="card-type-badge badge-talk" id="cardBadge">💬 话题</div>
    <div class="card-question" id="cardQuestion">✦ 准备好了吗？<br>和另一半开始今晚的深度对话吧 ✨</div>
    <div class="answer-text" id="answerText"></div>
    <div class="card-meta">
      <span class="card-number" id="cardNum">#000</span>
      <button class="reveal-btn" id="revealBtn" style="display:none" onclick="revealAnswer()">揭晓答案</button>
      <span class="card-tag" id="cardTag">夜间话题</span>
    </div>
  </div>
</div>

<div class="controls">
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-cat="all">全部</button>
    <button class="filter-btn" data-cat="情感">💬情感</button>
    <button class="filter-btn" data-cat="梦想">🌟梦想</button>
    <button class="filter-btn" data-cat="童年">🧒童年</button>
    <button class="filter-btn" data-cat="亲子">👨‍👩‍👧亲子</button>
    <button class="filter-btn" data-cat="趣味">😄趣味</button>
    <button class="filter-btn" data-cat="深度">🔮深度</button>
    <button class="filter-btn" data-cat="游戏">🎲游戏</button>
    <button class="filter-btn" data-cat="谜语">🧩谜语</button>
    <button class="filter-btn" data-cat="挑战">🔥挑战</button>
    <button class="filter-btn" data-cat="夜话">🌙夜话</button>
    <button class="filter-btn" data-cat="前任">👻前任</button>
  </div>
  <button class="btn-draw" id="drawBtn">抽 取 话 题</button>
</div>

<button class="history-toggle" id="historyToggle">已抽 <span id="historyCount">0</span> 张 · 点击看上一张</button>

<div class="toast" id="toast"></div>

<script>
const topics = [
  // ===== 情感 60 =====
  {q:"你觉得我们在一起之后，你改变最大的是什么？",cat:"情感",type:"talk"},
  {q:"你什么时候感觉我们之间距离最近？",cat:"情感",type:"talk"},
  {q:"有没有一件事，你一直想跟我说但没说出口？",cat:"情感",type:"talk"},
  {q:"如果时间倒流，你还会选择和我在一起吗？",cat:"情感",type:"talk"},
  {q:"你最喜欢我身上哪一个小缺点？",cat:"情感",type:"talk"},
  {q:"我做过让你最感动的一件事是什么？",cat:"情感",type:"talk"},
  {q:"你觉得爱情和婚姻最难的部分是什么？",cat:"情感",type:"talk"},
  {q:"最近有没有什么事情你觉得我不够理解你？",cat:"情感",type:"talk"},
  {q:"你希望我们10年后是什么样子？",cat:"情感",type:"talk"},
  {q:"你觉得我们关系中最宝贵的是什么？",cat:"情感",type:"talk"},
  {q:"第一次见到我的时候，你的第一印象是什么？",cat:"情感",type:"talk"},
  {q:"你觉得我们关系里谁付出更多？",cat:"情感",type:"talk"},
  {q:"有什么是你希望我能更主动做到的？",cat:"情感",type:"talk"},
  {q:"你上一次真正开心大笑是什么时候？因为什么？",cat:"情感",type:"talk"},
  {q:"如果我明天就要消失，你最想对我说什么？",cat:"情感",type:"talk"},
  {q:"你觉得我们的爱情里最珍贵的习惯是什么？",cat:"情感",type:"talk"},
  {q:"结婚/在一起以来，你觉得最正确的决定是什么？",cat:"情感",type:"talk"},
  {q:"你最近有没有因为我而感到委屈？",cat:"情感",type:"talk"},
  {q:"你心目中理想的老年生活是什么样子？",cat:"情感",type:"talk"},

let currentCat = 'all';
let drawnIndices = new Set();
let favorites = new Set();
let currentIndex = -1;
let history = [];
let scores = {A:0,B:0};

function addWin(who) {
  scores[who]++;
  document.getElementById('score'+who).textContent = scores[who];
  // highlight winner briefly
  const el = document.getElementById('scoreItem'+who);
  el.classList.add('winner');
  setTimeout(() => el.classList.remove('winner'), 1200);
  showToast(who === 'A' ? '👩 女生 +1！' : '👨 男生 +1！');
}

const mainCard = document.getElementById('mainCard');
const cardQuestion = document.getElementById('cardQuestion');
const cardBadge = document.getElementById('cardBadge');
const cardNum = document.getElementById('cardNum');
const cardTag = document.getElementById('cardTag');
const counterNum = document.getElementById('counterNum');
const drawBtn = document.getElementById('drawBtn');
const favBtn = document.getElementById('favBtn');
const ringFill = document.getElementById('ringFill');
const ringText = document.getElementById('ringText');
const historyCount = document.getElementById('historyCount');
const revealBtn = document.getElementById('revealBtn');
const answerText = document.getElementById('answerText');

const badgeConfig = {
  talk:   {cls:'badge-talk',   icon:'💬', label:'话题'},
  riddle: {cls:'badge-riddle', icon:'🧩', label:'谜语'},
  game:   {cls:'badge-game',   icon:'🎲', label:'游戏'},
  dare:   {cls:'badge-dare',   icon:'🔥', label:'挑战'},
  deep:   {cls:'badge-deep',   icon:'🔮', label:'深思'},
  flirt:  {cls:'badge-flirt',  icon:'🌙', label:'夜话'},
  ex:     {cls:'badge-ex',     icon:'👻', label:'前任'},
};
const typeCardClass = {talk:'', riddle:'type-riddle', game:'type-game', dare:'type-dare', deep:'type-deep', flirt:'type-flirt', ex:'type-ex'};

function updateProgress() {
  const pct = Math.round((drawnIndices.size / topics.length) * 100);
  const c = 119.4;
  ringFill.style.strokeDashoffset = c - (pct/100)*c;
  ringText.textContent = pct+'%';
  counterNum.textContent = drawnIndices.size;
  historyCount.textContent = history.length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function spawnParticle(x, y, emoji) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = emoji;
  p.style.left = x+'px';
  p.style.top = y+'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1600);
}

function revealAnswer() {
  answerText.classList.toggle('show');
  revealBtn.textContent = answerText.classList.contains('show') ? '隐藏答案' : '揭晓答案';
}

function drawCard() {
  const filtered = currentCat === 'all' ? topics : topics.filter(t => t.cat === currentCat);
  const undrawn = filtered.filter(t => !drawnIndices.has(topics.indexOf(t)));
  if (undrawn.length === 0) {
    showToast(currentCat === 'all' ? '🎉 全部'+topics.length+'张已抽完！' : '此分类已全部抽完！');
    return;
  }
  const pick = undrawn[Math.floor(Math.random() * undrawn.length)];
  const gi = topics.indexOf(pick);
  currentIndex = gi;
  drawnIndices.add(gi);
  history.push(gi);

  mainCard.classList.add('flipping');
  setTimeout(() => {
    const cfg = badgeConfig[pick.type] || badgeConfig.talk;
    cardBadge.className = 'card-type-badge ' + cfg.cls;
    cardBadge.textContent = cfg.icon + ' ' + pick.cat + ' · ' + cfg.label;
    mainCard.className = 'card ' + (typeCardClass[pick.type] || '');

    const q = pick.q.replace(/^🔥 /,'');
    cardQuestion.textContent = q;
    cardQuestion.className = q.length > 50 ? 'card-question xsmall' : q.length > 32 ? 'card-question small' : 'card-question';

    cardNum.textContent = '#' + String(drawnIndices.size).padStart(3,'0');
    cardTag.textContent = pick.cat;

    if (pick.type === 'riddle' && pick.answer) {
      revealBtn.style.display = 'inline-block';
      answerText.textContent = '答案：' + pick.answer;
      answerText.classList.remove('show');
      revealBtn.textContent = '揭晓答案';
    } else {
      revealBtn.style.display = 'none';
      answerText.classList.remove('show');
    }

    favBtn.className = favorites.has(gi) ? 'btn-fav active' : 'btn-fav';
    favBtn.textContent = favorites.has(gi) ? '♥' : '♡';

    // Show guess prompt for riddle/game cards
    const prompt = document.getElementById('guessPrompt');
    if (pick.type === 'riddle' || pick.type === 'game') {
      prompt.classList.add('show');
    } else {
      prompt.classList.remove('show');
    }
    updateProgress();
  }, 250);
  setTimeout(() => mainCard.classList.remove('flipping'), 520);

  const emojiMap = {
    riddle: ['🧩','💡','❓','✨'],
    game:   ['🎲','🎯','🎮','⭐'],
    dare:   ['🔥','💪','⚡','🌟'],
    deep:   ['🔮','💭','🌙','✨'],
    flirt:  ['💋','🌹','💕','✨'],
    ex:     ['👻','💭','🍃','✦'],
    talk:   ['❤','✨','💬','✦'],
  };
  const emojis = emojiMap[pick.type] || emojiMap.talk;
  const rect = drawBtn.getBoundingClientRect();
  for (let i = 0; i < 5; i++) {
    setTimeout(() => spawnParticle(rect.left + Math.random()*rect.width, rect.top-10, emojis[Math.floor(Math.random()*emojis.length)]), i*100);
  }
}

drawBtn.addEventListener('click', drawCard);
favBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (currentIndex === -1) return;
  if (favorites.has(currentIndex)) {
    favorites.delete(currentIndex); favBtn.className='btn-fav'; favBtn.textContent='♡'; showToast('已取消收藏');
  } else {
    favorites.add(currentIndex); favBtn.className='btn-fav active'; favBtn.textContent='♥'; showToast('❤ 已收藏');
  }
});
document.getElementById('filterRow').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  showToast('已切换：' + (currentCat==='all' ? '全部 '+topics.length+'张' : currentCat+'类'));
});
document.getElementById('historyToggle').addEventListener('click', () => {
  if (!history.length) { showToast('还没有抽取记录哦～'); return; }
  const last = topics[history[history.length-1]];
  showToast('上一张：' + last.q.substring(0,18)+'…');
});
updateProgress();
</script>
